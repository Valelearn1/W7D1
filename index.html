<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mini-libreria — Settimana VII Giorno I</title>
    <link rel="stylesheet" href="assets/css/style.css" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
  </head>
  <body>
    <header class="site-header">
      <h1>La mia libreria</h1>
      <p>Aggiungi i tuoi libri e segnali come letti.</p>
    </header>

    <main class="container">
      <section class="form-section">
        <!-- form per aggiungere un libro: titolo, autore, anno, formato (cartaceo/digitale) -->
        <div class="bg-white border border: rounded">
          <h2 class="fw-bold">Aggiungi un libro</h2>
          <form>
            <div class="mb-3">
              <label for="formGroupExampleInput" class="form-label"
                >Titolo</label
              >
              <input
                type="text"
                class="form-control"
                id="formGroupExampleInput"
                placeholder="Example input placeholder"
              />
            </div>
            <div class="mb-3">
              <label for="formGroupExampleInput2" class="form-label"
                >Autore</label
              >
              <input
                type="text"
                class="form-control"
                id="formGroupExampleInput2"
                placeholder="Another input placeholder"
              />
            </div>
          </form>
        </div>
      </section>

      <section class="lista-section">
        <h2>I tuoi libri</h2>
        <ul id="lista-libri">
          <!-- popolato da JavaScript -->
        </ul>
      </section>
    </main>

    <script src="assets/js/script.js"></script>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
